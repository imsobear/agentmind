name: Release

# Publish step in the release pipeline. Listens for the user enabling
# auto-merge on a `release/x.y.z â†’ main` PR, then publishes
# `agentmind-cli@x.y.z` to npm. Reports a `release` status check â€”
# auto-merge waits for that check to go green before it actually merges
# the PR.
#
# Net effect: the user clicks one button on the PR ("Enable auto-merge"),
# we publish first, and the merge only happens if publish succeeded.
#
# Re-runs on `synchronize` are intentional so that pushing a new commit
# after enabling auto-merge invalidates the prior publish gate.

on:
  pull_request:
    branches: [main]
    types: [auto_merge_enabled, synchronize]

permissions:
  contents: read
  pull-requests: read
  id-token: write     # required for `npm publish --provenance`

concurrency:
  group: release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release:
    # Only attempt to publish when auto-merge is currently enabled on
    # the PR and the head branch is `release/x.y.z`. Other PRs are
    # ignored â€” they'll never satisfy the required `release` check, so
    # they cannot merge into main.
    if: |
      github.event.pull_request.auto_merge != null &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate branch â†” version
        id: meta
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ ! "$BRANCH" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::head branch must be release/x.y.z (got: $BRANCH)"
            exit 1
          fi
          VERSION="${BRANCH#release/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::version mismatch: branch=$VERSION, package.json=$PKG_VERSION"
            exit 1
          fi
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$PKG_NAME"   >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vite + @tanstack/router-plugin writes src/routeTree.gen.ts, which
      # tsc needs to resolve the route modules.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Refuse if version already on npm
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "::error::${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} is already on the registry â€” refusing to overwrite."
            exit 1
          fi

      - name: npm publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

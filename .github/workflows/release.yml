name: Release

# This workflow IS the required `release` status check that auto-merge
# waits on before squash-merging a release/x.y.z → main PR.
#
# Behavior:
#
#   - Non-release-branch PR (e.g. docs/foo → main):
#       Job-level `if` is false → job is SKIPPED → GitHub treats the
#       required check as passing → PR can merge with just CI green.
#
#   - release/x.y.z → main PR, auto-merge NOT yet enabled:
#       Job runs. First step explicitly fails with a clear message.
#       Required `release` check goes red. PR cannot merge.
#
#   - release/x.y.z → main PR, auto-merge enabled:
#       Job runs all the way. Validates branch ↔ version, re-builds,
#       re-typechecks, refuses if version is already on npm, then
#       `npm publish --provenance`. Job succeeds → `release` check
#       green → GitHub's auto-merge squashes the PR and deletes the
#       branch.
#
# Triggers also include `synchronize` so that any push to the head
# branch after auto-merge is enabled forces a re-publish (otherwise the
# stale green `release` check from a prior SHA would let stale code
# auto-merge).

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, auto_merge_enabled]

permissions:
  contents: read
  pull-requests: read
  id-token: write     # required for `npm publish --provenance`

concurrency:
  group: release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release:
    # Non-release branches bypass the whole thing — they don't need to
    # publish anything.
    if: startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Hard fail — and therefore a red `release` check — whenever
      # someone tries to publish without auto-merge being on. This is
      # what forces the operator into the "click Enable auto-merge"
      # flow rather than direct-merging.
      - name: Require auto-merge to be enabled
        if: ${{ github.event.pull_request.auto_merge == null }}
        run: |
          echo "::error::Auto-merge is not enabled on this PR."
          echo "::error::Click 'Enable auto-merge (squash)' on the PR to trigger publish + merge."
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate branch ↔ version
        id: meta
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ ! "$BRANCH" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::head branch must be release/x.y.z (got: $BRANCH)"
            exit 1
          fi
          VERSION="${BRANCH#release/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::version mismatch: branch=$VERSION, package.json=$PKG_VERSION"
            exit 1
          fi
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$PKG_NAME"   >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vite + @tanstack/router-plugin writes src/routeTree.gen.ts, which
      # tsc needs to resolve the route modules.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Refuse if version already on npm
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "::error::${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} is already on the registry — refusing to overwrite."
            exit 1
          fi

      - name: npm publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

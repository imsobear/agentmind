name: Windows smoke

# Manual sanity check that the production CLI actually boots on a real
# Windows runner and serves what it claims to serve. Not a required
# check — purely an on-demand probe for Windows compatibility work.
#
# Trigger via Actions tab → "Windows smoke" → Run workflow → pick the
# branch you want to test. Or:
#   gh workflow run "Windows smoke" --ref release/x.y.z

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # The actual portability test — boot the prebuilt CLI on a Windows
      # runner and hit the endpoints that broke before the 0.1.6 fixes:
      #   - GET /              SSR HTML
      #   - GET /favicon.svg   static (regressed pre-fix because the
      #                        traversal guard used a literal `/`)
      #   - GET /assets/*.js   hashed asset (same regression)
      #   - GET /api/sessions  capture-API JSON
      #   - GET /../package.json  traversal — must 404
      - name: Start CLI in background
        run: |
          $logPath = "$env:GITHUB_WORKSPACE\cli.log"
          $errPath = "$env:GITHUB_WORKSPACE\cli.err.log"
          $proc = Start-Process node `
            -ArgumentList 'bin/cli.js','--port','8189','--no-open' `
            -PassThru `
            -NoNewWindow `
            -RedirectStandardOutput $logPath `
            -RedirectStandardError  $errPath
          "$($proc.Id)" | Out-File -FilePath "$env:GITHUB_WORKSPACE\cli.pid" -NoNewline
          Write-Host "CLI pid: $($proc.Id) (log: $logPath)"

      - name: Wait for readiness
        run: |
          $start = Get-Date
          $deadline = $start.AddSeconds(60)
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
            try {
              $r = Invoke-WebRequest http://127.0.0.1:8189/api/sessions -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                $elapsed = [int]((Get-Date) - $start).TotalMilliseconds
                Write-Host "CLI ready after ${elapsed}ms"
                exit 0
              }
            } catch { }
          }
          Write-Host "::error::CLI never became ready within 60s"
          Get-Content "$env:GITHUB_WORKSPACE\cli.log"     -ErrorAction SilentlyContinue
          Get-Content "$env:GITHUB_WORKSPACE\cli.err.log" -ErrorAction SilentlyContinue
          exit 1

      - name: Probe — root SSR
        run: |
          $r = Invoke-WebRequest http://127.0.0.1:8189/ -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Host "::error::GET / => $($r.StatusCode)"; exit 1 }
          if ($r.Content -notmatch 'AgentMind') {
            Write-Host "::error::GET / body did not mention AgentMind"
            Write-Host $r.Content.Substring(0, [Math]::Min(500, $r.Content.Length))
            exit 1
          }
          Write-Host "GET / => 200, body looks right"

      - name: Probe — favicon (regressed pre-fix)
        run: |
          $r = Invoke-WebRequest http://127.0.0.1:8189/favicon.svg -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Host "::error::GET /favicon.svg => $($r.StatusCode)"; exit 1 }
          $ct = $r.Headers['Content-Type']
          if ($ct -notmatch 'image/svg') {
            Write-Host "::error::GET /favicon.svg content-type unexpected: $ct"; exit 1
          }
          Write-Host "GET /favicon.svg => 200 ($ct)"

      - name: Probe — hashed asset (regressed pre-fix)
        run: |
          $html = (Invoke-WebRequest http://127.0.0.1:8189/ -UseBasicParsing).Content
          if (-not ($html -match '/assets/[A-Za-z0-9._-]+\.js')) {
            Write-Host "::error::no /assets/*.js reference in HTML — vite build layout changed?"
            exit 1
          }
          $asset = $Matches[0]
          Write-Host "asset path: $asset"
          $r = Invoke-WebRequest "http://127.0.0.1:8189$asset" -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Host "::error::GET $asset => $($r.StatusCode)"; exit 1 }
          if ($r.Headers['Content-Type'] -notmatch 'javascript') {
            Write-Host "::error::asset content-type unexpected: $($r.Headers['Content-Type'])"
            exit 1
          }
          Write-Host "GET $asset => 200"

      - name: Probe — capture API
        run: |
          $r = Invoke-WebRequest http://127.0.0.1:8189/api/sessions -UseBasicParsing
          if ($r.StatusCode -ne 200) { Write-Host "::error::GET /api/sessions => $($r.StatusCode)"; exit 1 }
          # On a clean runner sessions dir is empty — body should parse as [].
          $body = $r.Content | ConvertFrom-Json
          if ($null -eq $body) { Write-Host "::error::/api/sessions did not return JSON"; exit 1 }
          Write-Host "GET /api/sessions => 200 ($($body.Count) sessions)"

      - name: Probe — path traversal is blocked
        run: |
          # `Invoke-WebRequest` 404s throw; treat 404 (or 400) as PASS,
          # 200 as FAIL.
          $status = 0
          try {
            $r = Invoke-WebRequest "http://127.0.0.1:8189/assets/../../package.json" `
              -UseBasicParsing
            $status = $r.StatusCode
          } catch {
            $status = [int]$_.Exception.Response.StatusCode
          }
          if ($status -eq 200) {
            Write-Host "::error::traversal probe returned 200 — path-traversal guard broken"
            exit 1
          }
          Write-Host "GET /assets/../../package.json => $status (blocked)"

      - name: Stop CLI
        if: always()
        run: |
          $pidPath = "$env:GITHUB_WORKSPACE\cli.pid"
          if (Test-Path $pidPath) {
            $cliPid = Get-Content $pidPath
            try { Stop-Process -Id $cliPid -Force -ErrorAction SilentlyContinue } catch { }
          }

      - name: Dump logs on failure
        if: failure()
        run: |
          Write-Host "--- cli.log ---"
          Get-Content "$env:GITHUB_WORKSPACE\cli.log" -ErrorAction SilentlyContinue
          Write-Host "--- cli.err.log ---"
          Get-Content "$env:GITHUB_WORKSPACE\cli.err.log" -ErrorAction SilentlyContinue

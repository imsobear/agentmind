name: Windows smoke

# Manual sanity check that the production CLI actually boots on a real
# Windows runner and serves what it claims to serve. Not a required
# check — purely an on-demand probe for Windows compatibility work.
#
# Trigger via Actions tab → "Windows smoke" → Run workflow → pick the
# branch you want to test. Or:
#   gh workflow run "Windows smoke" --ref release/x.y.z

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # The actual portability test — boot the prebuilt CLI on a Windows
      # runner and hit the endpoints that broke before the 0.1.6 fixes:
      #   - GET /              SSR HTML
      #   - GET /favicon.svg   static (regressed pre-fix because the
      #                        traversal guard used a literal `/`)
      #   - GET /assets/*.js   hashed asset (same regression)
      #   - GET /api/sessions  capture-API JSON
      #   - GET /../package.json  traversal — must 404
      - name: Start CLI in background
        run: |
          $logPath = "$env:GITHUB_WORKSPACE\cli.log"
          $errPath = "$env:GITHUB_WORKSPACE\cli.err.log"
          $proc = Start-Process node `
            -ArgumentList 'bin/cli.js','--port','8189','--no-open' `
            -PassThru `
            -NoNewWindow `
            -RedirectStandardOutput $logPath `
            -RedirectStandardError  $errPath
          "$($proc.Id)" | Out-File -FilePath "$env:GITHUB_WORKSPACE\cli.pid" -NoNewline
          Write-Host "CLI pid: $($proc.Id) (log: $logPath)"

      # All probes go through curl.exe rather than Invoke-WebRequest.
      # PSv7's Invoke-WebRequest on windows-latest does proxy auto-
      # detection + connection-pooling that intermittently never
      # actually opens a TCP connection to 127.0.0.1, which made the
      # readiness probe time out for 60s even though the server log
      # showed "ready at http://127.0.0.1:8189" within the first
      # second. curl.exe ships on windows-latest and behaves exactly
      # like everywhere else.

      - name: Wait for readiness
        run: |
          $start = Get-Date
          $deadline = $start.AddSeconds(60)
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
            $code = (& curl.exe -s -o NUL -w "%{http_code}" --max-time 2 `
              http://127.0.0.1:8189/api/sessions)
            if ($code -eq '200') {
              $elapsed = [int]((Get-Date) - $start).TotalMilliseconds
              Write-Host "CLI ready after ${elapsed}ms"
              exit 0
            }
          }
          Write-Host "::error::CLI never became ready within 60s"
          Get-Content "$env:GITHUB_WORKSPACE\cli.log"     -ErrorAction SilentlyContinue
          Get-Content "$env:GITHUB_WORKSPACE\cli.err.log" -ErrorAction SilentlyContinue
          exit 1

      - name: Probe — root SSR
        run: |
          $body = & curl.exe -fsS http://127.0.0.1:8189/
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::GET / failed (curl exit $LASTEXITCODE)"; exit 1 }
          if ($body -notmatch 'AgentMind') {
            Write-Host "::error::GET / body did not mention AgentMind"
            Write-Host $body.Substring(0, [Math]::Min(500, $body.Length))
            exit 1
          }
          Write-Host "GET / => 200, body looks right"

      - name: Probe — favicon (regressed pre-fix)
        run: |
          $code = & curl.exe -s -o NUL -w "%{http_code}" `
            -H "Accept: image/svg+xml" http://127.0.0.1:8189/favicon.svg
          $ct   = & curl.exe -sI http://127.0.0.1:8189/favicon.svg `
            | Select-String -Pattern '^content-type:' | ForEach-Object { $_.Line.Trim() }
          if ($code -ne '200') { Write-Host "::error::GET /favicon.svg => $code"; exit 1 }
          if ($ct -notmatch 'image/svg') {
            Write-Host "::error::GET /favicon.svg content-type unexpected: $ct"; exit 1
          }
          Write-Host "GET /favicon.svg => 200 ($ct)"

      - name: Probe — hashed asset (regressed pre-fix)
        run: |
          $html = & curl.exe -fsS http://127.0.0.1:8189/
          if (-not ($html -match '/assets/[A-Za-z0-9._-]+\.js')) {
            Write-Host "::error::no /assets/*.js reference in HTML — vite build layout changed?"
            exit 1
          }
          $asset = $Matches[0]
          Write-Host "asset path: $asset"
          $code = & curl.exe -s -o NUL -w "%{http_code}" "http://127.0.0.1:8189$asset"
          $ct   = & curl.exe -sI "http://127.0.0.1:8189$asset" `
            | Select-String -Pattern '^content-type:' | ForEach-Object { $_.Line.Trim() }
          if ($code -ne '200') { Write-Host "::error::GET $asset => $code"; exit 1 }
          if ($ct -notmatch 'javascript') {
            Write-Host "::error::asset content-type unexpected: $ct"
            exit 1
          }
          Write-Host "GET $asset => 200"

      - name: Probe — capture API
        run: |
          $body = & curl.exe -fsS http://127.0.0.1:8189/api/sessions
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::GET /api/sessions failed"; exit 1 }
          $sessions = $body | ConvertFrom-Json
          if ($null -eq $sessions) { Write-Host "::error::/api/sessions did not return JSON"; exit 1 }
          Write-Host "GET /api/sessions => 200 ($($sessions.Count) sessions)"

      - name: Probe — path traversal is blocked
        run: |
          # curl --path-as-is so the literal `..` reaches the server
          # instead of getting client-side normalized.
          $code = & curl.exe -s -o NUL -w "%{http_code}" --path-as-is `
            "http://127.0.0.1:8189/assets/../../package.json"
          if ($code -eq '200') {
            Write-Host "::error::traversal probe returned 200 — path-traversal guard broken"
            exit 1
          }
          Write-Host "GET /assets/../../package.json => $code (blocked)"

      - name: Stop CLI
        if: always()
        run: |
          $pidPath = "$env:GITHUB_WORKSPACE\cli.pid"
          if (Test-Path $pidPath) {
            $cliPid = Get-Content $pidPath
            try { Stop-Process -Id $cliPid -Force -ErrorAction SilentlyContinue } catch { }
          }

      - name: Dump logs on failure
        if: failure()
        run: |
          Write-Host "--- cli.log ---"
          Get-Content "$env:GITHUB_WORKSPACE\cli.log" -ErrorAction SilentlyContinue
          Write-Host "--- cli.err.log ---"
          Get-Content "$env:GITHUB_WORKSPACE\cli.err.log" -ErrorAction SilentlyContinue

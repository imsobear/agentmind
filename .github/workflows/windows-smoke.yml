name: Windows smoke

# Manual sanity check that the production CLI actually boots on a real
# Windows runner and serves what it claims to serve. Not a required
# check — purely an on-demand probe for Windows compatibility work.
#
# Trigger via Actions tab → "Windows smoke" → Run workflow → pick the
# branch you want to test. Or:
#   gh workflow run "Windows smoke" --ref release/x.y.z

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # The actual portability test — boot the prebuilt CLI on a Windows
      # runner and hit the endpoints that broke before the 0.1.6 fixes:
      #   - GET /              SSR HTML
      #   - GET /favicon.svg   static (regressed pre-fix because the
      #                        traversal guard used a literal `/`)
      #   - GET /assets/*.js   hashed asset (same regression)
      #   - GET /api/sessions  capture-API JSON
      #   - GET /../package.json  traversal — must 404
      #
      # IMPORTANT: the GH Actions Windows runner wraps each `run:` step
      # in a Windows Job Object. When the step ends, every process in
      # that job is force-terminated. Earlier revisions of this workflow
      # spawned the CLI in a "Start CLI" step and tried to probe it in
      # later steps — the CLI was killed the instant the spawning step
      # ended, so probes always saw "Connection refused" even though
      # cli.log already had "ready at http://127.0.0.1:8189". Fix: keep
      # the CLI and every probe inside one big step.
      - name: Smoke test (boot CLI + probe endpoints)
        run: |
          $base    = 'http://127.0.0.1:8189'
          $logPath = "$env:GITHUB_WORKSPACE\cli.log"
          $errPath = "$env:GITHUB_WORKSPACE\cli.err.log"

          $proc = Start-Process node `
            -ArgumentList 'bin/cli.js','--port','8189','--no-open' `
            -PassThru `
            -NoNewWindow `
            -RedirectStandardOutput $logPath `
            -RedirectStandardError  $errPath
          Write-Host "CLI pid: $($proc.Id) (log: $logPath)"

          # curl.exe for every probe — PSv7 Invoke-WebRequest on
          # windows-latest sometimes never opens a TCP connection to
          # 127.0.0.1.
          function Fail([string]$msg) {
            Write-Host "::error::$msg"
            Write-Host '--- cli.log ---'
            Get-Content $logPath -ErrorAction SilentlyContinue
            Write-Host '--- cli.err.log ---'
            Get-Content $errPath -ErrorAction SilentlyContinue
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch { }
            exit 1
          }

          try {
            # 1. wait for readiness (max 60s)
            $start    = Get-Date
            $deadline = $start.AddSeconds(60)
            $ready    = $false
            while ((Get-Date) -lt $deadline) {
              Start-Sleep -Milliseconds 500
              if ($proc.HasExited) {
                Fail "CLI process exited early (exit=$($proc.ExitCode)) before becoming ready"
              }
              $code = (& curl.exe -s -o NUL -w "%{http_code}" --max-time 2 "$base/api/sessions")
              if ($code -eq '200') {
                $elapsed = [int]((Get-Date) - $start).TotalMilliseconds
                Write-Host "CLI ready after ${elapsed}ms"
                $ready = $true
                break
              }
            }
            if (-not $ready) { Fail "CLI never became ready within 60s" }

            # 2. GET /  — SSR HTML mentions the product name
            $body = & curl.exe -fsS "$base/"
            if ($LASTEXITCODE -ne 0) { Fail "GET / failed (curl exit $LASTEXITCODE)" }
            if ($body -notmatch 'AgentMind') {
              Write-Host $body.Substring(0, [Math]::Min(500, $body.Length))
              Fail "GET / body did not mention AgentMind"
            }
            Write-Host "GET / => 200, body looks right"

            # 3. GET /favicon.svg — static asset (regressed pre-0.1.6)
            $code = & curl.exe -s -o NUL -w "%{http_code}" "$base/favicon.svg"
            $ct   = (& curl.exe -sI "$base/favicon.svg" `
              | Select-String -Pattern '^content-type:').Line.Trim()
            if ($code -ne '200')         { Fail "GET /favicon.svg => $code" }
            if ($ct -notmatch 'image/svg') { Fail "GET /favicon.svg content-type unexpected: $ct" }
            Write-Host "GET /favicon.svg => 200 ($ct)"

            # 4. GET /assets/*.js — hashed asset (regressed pre-0.1.6)
            if (-not ($body -match '/assets/[A-Za-z0-9._-]+\.js')) {
              Fail "no /assets/*.js reference in HTML — vite build layout changed?"
            }
            $asset = $Matches[0]
            Write-Host "asset path: $asset"
            $code = & curl.exe -s -o NUL -w "%{http_code}" "$base$asset"
            $ct   = (& curl.exe -sI "$base$asset" `
              | Select-String -Pattern '^content-type:').Line.Trim()
            if ($code -ne '200')      { Fail "GET $asset => $code" }
            if ($ct -notmatch 'javascript') { Fail "asset content-type unexpected: $ct" }
            Write-Host "GET $asset => 200"

            # 5. GET /api/sessions — capture-API JSON
            # NOTE: avoid `ConvertFrom-Json` for the emptiness check
            # because PowerShell pipeline-unwraps an empty array to
            # $null, which then makes `$null -eq $sessions` true and
            # we'd mis-report a healthy empty-state as a failure.
            # Just verify the body literally looks like a JSON array.
            $body = & curl.exe -fsS "$base/api/sessions"
            if ($LASTEXITCODE -ne 0)       { Fail "GET /api/sessions failed" }
            if ($body -notmatch '^\s*\[')  { Fail "/api/sessions did not return JSON array, body=$body" }
            Write-Host "GET /api/sessions => 200 (body=$body)"

            # 6. GET /assets/../../package.json — path-traversal MUST be blocked.
            # --path-as-is keeps the literal `..` so the server gets to make the
            # decision.
            $code = & curl.exe -s -o NUL -w "%{http_code}" --path-as-is `
              "$base/assets/../../package.json"
            if ($code -eq '200') { Fail "traversal probe returned 200 — path-traversal guard broken" }
            Write-Host "GET /assets/../../package.json => $code (blocked)"

            Write-Host "✅ Windows smoke passed"
          } finally {
            try { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue } catch { }
          }

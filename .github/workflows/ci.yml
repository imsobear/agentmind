name: CI

# Runs on every push to a non-main branch and on every PR targeting
# main. Mirrors the build + typecheck steps from release.yml so a broken
# release/* branch is caught before merge — without duplicating the
# publish step.

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vite + @tanstack/router-plugin writes src/routeTree.gen.ts, which
      # tsc needs to resolve the route modules.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck
